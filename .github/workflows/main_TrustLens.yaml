name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend import smoke test
        env:
          # Minimal env needed so config import doesn't fail
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
        run: |
          # Fail early with clear diagnostics if required env vars are missing.
          # (We only report variable names, never secret values.)
          python - <<'PY'
          import os, sys

          required_for_openai_client = ["AZURE_OPENAI_ENDPOINT", "AZURE_OPENAI_KEY"]
          missing = [k for k in required_for_openai_client if not os.getenv(k)]
          if missing:
              print("Missing required env var(s) for OpenAI client init:", ", ".join(missing))
              sys.exit(1)

          print("OpenAI client env vars present:", ", ".join(required_for_openai_client))
          PY

          python -m compileall app
          python -c "import app.main"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: "http://localhost:8001"
        run: npm run build